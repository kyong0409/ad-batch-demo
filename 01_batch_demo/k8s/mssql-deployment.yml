apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-pvc
  namespace: ad-batch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql
  namespace: ad-batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
        - name: mssql
          image: mcr.microsoft.com/azure-sql-edge:latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              value: "BatchDemo2026!"
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "2Gi"
              cpu: "500m"
          volumeMounts:
            - name: mssql-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: mssql-storage
          persistentVolumeClaim:
            claimName: mssql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mssql-service
  namespace: ad-batch
spec:
  type: ClusterIP
  selector:
    app: mssql
  ports:
    - port: 1433
      targetPort: 1433
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mssql-init
  namespace: ad-batch
spec:
  backoffLimit: 5
  template:
    spec:
      initContainers:
        - name: wait-for-mssql
          image: mcr.microsoft.com/azure-sql-edge:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for MSSQL to be ready..."
              for i in $(seq 1 30); do
                /opt/mssql-tools/bin/sqlcmd \
                  -S mssql-service,1433 \
                  -U SA \
                  -P "BatchDemo2026!" \
                  -C \
                  -Q "SELECT 1" > /dev/null 2>&1 && echo "MSSQL is ready" && exit 0
                echo "Attempt $i: MSSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "MSSQL did not become ready in time" && exit 1
      containers:
        - name: create-db
          image: mcr.microsoft.com/azure-sql-edge:latest
          command:
            - /bin/bash
            - -c
            - |
              /opt/mssql-tools/bin/sqlcmd \
                -S mssql-service,1433 \
                -U SA \
                -P "BatchDemo2026!" \
                -C \
                -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'ad_batch_demo') CREATE DATABASE ad_batch_demo"
              echo "Database ad_batch_demo created (or already exists)"
      restartPolicy: OnFailure
