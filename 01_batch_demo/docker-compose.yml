services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "BatchDemo2026!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "BatchDemo2026!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mssql-data:
