apiVersion: batch/v1
kind: Job
metadata:
  name: data-sync-job
  namespace: ad-batch
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: failing-batch
          image: failing-batch-demo:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      restartPolicy: Never
